<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETU</title><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f0f2f5;
}

.header{
background:#128C7E;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.addbtn{
background:white;
border:none;
border-radius:50%;
width:40px;
height:40px;
font-size:22px;
color:#128C7E;
}

.chat-item{
display:flex;
align-items:center;
padding:15px;
background:white;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#128C7E;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:10px;
}

.name{
font-weight:bold;
font-size:16px;
}

#chat-box{
height:80vh;
overflow-y:auto;
padding:10px;
background:#ece5dd;
}

.input-area{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
padding:8px;
background:white;
}

.input-area input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:20px;
}

.input-area button{
margin-left:5px;
width:50px;
border:none;
border-radius:50%;
background:#128C7E;
color:white;
}

.me{
display:flex;
justify-content:flex-end;
margin:8px;
}

.you{
display:flex;
justify-content:flex-start;
margin:8px;
}

.bubble-me{
background:#DCF8C6;
padding:10px;
border-radius:12px;
max-width:70%;
}

.bubble-you{
background:white;
padding:10px;
border-radius:12px;
max-width:70%;
}
</style></head><body><div id="app"></div><script>

let currentUser =
localStorage.getItem("setuMobile");

if(!currentUser){
location.href="login.html";
}

let selectedUser="";

loadContacts();

async function loadContacts(){

let response =
await fetch("/contacts?owner="+currentUser);

let contacts =
await response.json();

let html=`

<div class="header">
<div class="logo">सेतु</div>

<button class="addbtn"
onclick="location.href='add-contact.html'">
+
</button>

</div>
`;

contacts.forEach(c=>{

html += `

<div class="chat-item"
onclick="openChat('${c.mobile}','${c.name}')">

<div class="avatar">
${c.name.charAt(0).toUpperCase()}
</div>

<div>
<div class="name">
${c.name}
</div>

<div>
${c.mobile}
</div>
</div>

</div>

`;

});

document.getElementById("app")
.innerHTML = html;

}

function openChat(mobile,name){

selectedUser = mobile;

document.getElementById("app")
.innerHTML = `

<div class="header">
<div onclick="loadContacts()">
← ${name}
</div>
</div>

<div id="chat-box"></div>

<div class="input-area">

<input
id="message"
placeholder="Message">

<button onclick="sendMessage()">
➤
</button>

</div>

`;

loadMessages();

}

async function sendMessage(){

let text =
document.getElementById("message")
.value.trim();

if(text==="") return;

let now = new Date();

let time =
now.getHours()+":"+
String(now.getMinutes())
.padStart(2,"0");

await fetch("/save-message",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

from:currentUser,
to:selectedUser,
text,
time

})

});

document.getElementById("message")
.value="";

loadMessages();

}

async function loadMessages(){

let response =
await fetch("/messages");

let messages =
await response.json();

let html="";

messages.forEach(msg=>{

if(
(msg.from===currentUser &&
msg.to===selectedUser)
||
(msg.from===selectedUser &&
msg.to===currentUser)
){

if(msg.from===currentUser){

html += `
<div class="me">
<div class="bubble-me">
${msg.text}
</div>
</div>
`;

}else{

html += `
<div class="you">
<div class="bubble-you">
${msg.text}
</div>
</div>
`;

}

}

});

document.getElementById("chat-box")
.innerHTML = html;

}
</script></body>
</html>
