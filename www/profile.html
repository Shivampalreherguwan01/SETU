<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETU Profile</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#128C7E;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
width:90%;
max-width:400px;
margin:30px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#128C7E;
color:white;
font-size:50px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.name{
font-size:24px;
margin-top:15px;
font-weight:bold;
}

.info{
margin-top:10px;
color:#666;
}

button{
width:100%;
height:45px;
margin-top:20px;
border:none;
border-radius:12px;
background:#128C7E;
color:white;
font-size:16px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
सेतु प्रोफ़ाइल
</div>

<div class="card">

<div class="avatar">
👤
</div>

<div class="name" id="name">
Shivam
</div>

<div class="info">
SETU User
</div>

<button onclick="logout()">
लॉगआउट
</button>

</div>

<script>

function logout(){

window.location.href="login.html";

}

</script>

</body>
</html>
