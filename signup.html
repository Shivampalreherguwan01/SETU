<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SETU Signup</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#128C7E,#25D366);
}

.box{
width:90%;
max-width:360px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
box-sizing:border-box;
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
color:#128C7E;
}

.subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-top:5px;
margin-bottom:20px;
}

input{
width:100%;
height:45px;
padding-left:12px;
margin-top:10px;
border:2px solid #ddd;
border-radius:12px;
box-sizing:border-box;
font-size:16px;
}

input:focus{
outline:none;
border-color:#25D366;
}

button{
width:100%;
height:45px;
margin-top:15px;
border:none;
border-radius:12px;
background:#128C7E;
color:white;
font-size:17px;
font-weight:bold;
}

#result{
text-align:center;
margin-top:12px;
font-size:14px;
color:#128C7E;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#777;
}

a{
color:#128C7E;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">
सेतु
</div>

<div class="subtitle">
मोबाइल नंबर से खाता बनाएं
</div>

<input
id="name"
placeholder="पूरा नाम">

<input
id="mobile"
placeholder="मोबाइल नंबर">

<button onclick="signup()">
OTP प्राप्त करें
</button>

<p id="result"></p>

<div class="footer">
पहले से खाता है?
<br><br>
<a href="login.html">
लॉगिन करें
</a>
</div>

</div>

<script>

async function signup(){

let name =
document.getElementById("name").value.trim();

let mobile =
document.getElementById("mobile").value.trim();

if(name==="" || mobile===""){

document.getElementById("result").innerHTML =
"सभी जानकारी भरें";

return;

}

let response =
await fetch("https://setu-zo64.onrender.com/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
mobile
})

});

let data =
await response.json();

document.getElementById("result").innerHTML =
data.message;

}

</script>

</body>
</html>
